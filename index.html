<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viaje París & Disney 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            disney: { DEFAULT: '#1a237e', light: '#3949ab', dark: '#0d1257' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .tab-btn { transition: all .2s; }
    .tab-btn.active { background: #1a237e; color: white; }
    .tab-btn:not(.active):hover { background: #e8eaf6; }
    .section { display: none; }
    .section.active { display: block; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
    .card { transition: box-shadow .2s; }
    .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.12); }
    ::-webkit-scrollbar { width:6px; height:6px }
    ::-webkit-scrollbar-track { background:#f1f1f1 }
    ::-webkit-scrollbar-thumb { background:#c5cae9; border-radius:3px }
    .progress-bar { background: linear-gradient(90deg, #4caf50, #81c784); }
    .saldo-pos { color: #2e7d32; }
    .saldo-neg { color: #c62828; }
    @media (max-width:640px) { .hide-mobile { display:none } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- DATA (cargada desde data.js) -->
<script src="data.js"></script>

<!-- HEADER -->
<header class="bg-gradient-to-r from-[#1a237e] to-[#3949ab] text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold leading-tight" id="header-title">Viaje París &amp; Disney 2026</h1>
      <p class="text-xs text-blue-200 mt-0.5" id="header-fechas">7–13 Septiembre 2026 · 6 personas</p>
    </div>
    <div class="text-right hide-mobile">
      <p class="text-xs text-blue-200">Total viaje</p>
      <p class="text-xl font-bold" id="header-total">5.585,39€</p>
    </div>
  </div>
  <!-- Tabs -->
  <div class="max-w-6xl mx-auto px-2 pb-0">
    <nav class="flex gap-1 overflow-x-auto pb-0 scrollbar-hide" id="nav">
      <button data-tab="resumen"     class="tab-btn active whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">📊 Resumen</button>
      <button data-tab="reparto"     class="tab-btn whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">💸 Reparto</button>
      <button data-tab="itinerario"  class="tab-btn whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">📅 Itinerario</button>
      <button data-tab="transporte"  class="tab-btn whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">🚇 Transporte</button>
      <button data-tab="reservas"    class="tab-btn whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">📋 Reservas</button>
      <button data-tab="disney"      class="tab-btn whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">🎢 Disney</button>
      <button data-tab="checklist"   class="tab-btn whitespace-nowrap px-3 py-2 text-xs font-semibold rounded-t-lg">✅ Checklist</button>
    </nav>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6">

  <!-- ══ RESUMEN ═══════════════════════════════════════════════════ -->
  <div id="tab-resumen" class="section active fade-in">
    <div id="resumen-content"></div>
  </div>

  <!-- ══ REPARTO ═══════════════════════════════════════════════════ -->
  <div id="tab-reparto" class="section fade-in">
    <div id="reparto-content"></div>
  </div>

  <!-- ══ ITINERARIO ════════════════════════════════════════════════ -->
  <div id="tab-itinerario" class="section fade-in">
    <div id="itinerario-content"></div>
  </div>

  <!-- ══ TRANSPORTE ════════════════════════════════════════════════ -->
  <div id="tab-transporte" class="section fade-in">
    <div id="transporte-content"></div>
  </div>

  <!-- ══ RESERVAS ══════════════════════════════════════════════════ -->
  <div id="tab-reservas" class="section fade-in">
    <div id="reservas-content"></div>
  </div>

  <!-- ══ DISNEY ════════════════════════════════════════════════════ -->
  <div id="tab-disney" class="section fade-in">
    <div id="disney-content"></div>
  </div>

  <!-- ══ CHECKLIST ═════════════════════════════════════════════════ -->
  <div id="tab-checklist" class="section fade-in">
    <div id="checklist-content"></div>
  </div>

</main>

<footer class="text-center text-xs text-gray-400 py-6 border-t border-gray-100">
  Viaje París &amp; Disney 2026 · Última actualización: Abril 2026 · Para actualizar los datos, editar <code>data.js</code>
</footer>

<script>
// ── Utilidades ────────────────────────────────────────────────────────────
const fmt = n => Number(n).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2}) + '€';
const fmtN = n => Number(n).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2});
const pct = (a,b) => Math.round((a/b)*100);

const COLOR_MAP = {
  blue:   { bg:'bg-blue-50',   border:'border-blue-200',   hdr:'bg-blue-700',   tag:'bg-blue-100 text-blue-800' },
  green:  { bg:'bg-green-50',  border:'border-green-200',  hdr:'bg-green-700',  tag:'bg-green-100 text-green-800' },
  red:    { bg:'bg-red-50',    border:'border-red-200',    hdr:'bg-red-700',    tag:'bg-red-100 text-red-800' },
  purple: { bg:'bg-purple-50', border:'border-purple-200', hdr:'bg-purple-700', tag:'bg-purple-100 text-purple-800' },
  amber:  { bg:'bg-amber-50',  border:'border-amber-200',  hdr:'bg-amber-600',  tag:'bg-amber-100 text-amber-800' },
  orange: { bg:'bg-orange-50', border:'border-orange-200', hdr:'bg-orange-600', tag:'bg-orange-100 text-orange-800' },
  teal:   { bg:'bg-teal-50',   border:'border-teal-200',   hdr:'bg-teal-700',   tag:'bg-teal-100 text-teal-800' },
  indigo: { bg:'bg-indigo-50', border:'border-indigo-200', hdr:'bg-indigo-700', tag:'bg-indigo-100 text-indigo-800' },
  yellow: { bg:'bg-yellow-50', border:'border-yellow-200', hdr:'bg-yellow-600', tag:'bg-yellow-100 text-yellow-800' },
};
const c = (color, k) => (COLOR_MAP[color] || COLOR_MAP.blue)[k];

// ── Navegación ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    const sec = document.getElementById('tab-' + btn.dataset.tab);
    sec.classList.add('active', 'fade-in');
    setTimeout(() => sec.classList.remove('fade-in'), 400);
  });
});

// ── RENDER principal ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const D = window.VIAJE_DATA;
  if (!D) { document.body.innerHTML='<p class="p-8 text-red-600">Error: data.js no cargado.</p>'; return; }

  document.getElementById('header-title').textContent = D.meta.titulo;
  document.getElementById('header-fechas').textContent = D.meta.fechas + ' · ' + D.meta.personas.length + ' personas';
  document.getElementById('header-total').textContent = fmt(D.meta.totalViaje);

  renderResumen(D);
  renderReparto(D);
  renderItinerario(D);
  renderTransporte(D);
  renderReservas(D);
  renderDisney(D);
  renderChecklist(D);
});

// ══ RESUMEN ═══════════════════════════════════════════════════════════════
function renderResumen(D) {
  const el = document.getElementById('resumen-content');
  const totalViaje = D.meta.totalViaje;

  // Cards de totales
  let gastoCards = D.financiero.gastos.map(g => `
    <div class="card bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <p class="text-lg font-bold text-gray-800">${g.concepto}</p>
      <p class="text-2xl font-extrabold text-[#1a237e] mt-1">${fmt(g.total)}</p>
      <p class="text-xs text-gray-400 mt-1">${g.referencia}</p>
      <div class="mt-3 space-y-1">
        ${g.detalle.map(d=>`
          <div class="flex justify-between text-xs">
            <span class="text-gray-600">${d.item}</span>
            <span class="font-semibold text-gray-700">${fmt(d.total)}</span>
          </div>
          <div class="text-xs text-gray-400 -mt-0.5 mb-1">${d.nota}</div>
        `).join('')}
      </div>
    </div>
  `).join('');

  // Quién pagó
  let pagoCards = D.financiero.pagos.map(p => `
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 flex items-center gap-4">
      <div class="text-3xl">${p.icon}</div>
      <div class="flex-1">
        <p class="font-bold text-gray-800">${p.quien}</p>
        <p class="text-xs text-gray-500">${p.concepto}</p>
      </div>
      <div class="text-right">
        <p class="text-xl font-extrabold text-[#1a237e]">${fmt(p.importe)}</p>
        <p class="text-xs text-gray-400">${pct(p.importe,totalViaje)}% del total</p>
      </div>
    </div>
  `).join('');

  // Barra de progreso del viaje
  const totalPagado = D.financiero.pagos.reduce((s,p)=>s+p.importe,0);

  // Mini resumen reparto
  const r1 = D.reparto.igual;
  const miniReparto = r1.transferencias.map(t=>`
    <div class="flex items-center gap-2 text-sm py-1.5 border-b border-gray-50 last:border-0">
      <span class="font-semibold text-gray-700 w-20 shrink-0">${t.de}</span>
      <span class="text-gray-400">→</span>
      <span class="text-gray-700 w-24 shrink-0">${t.a}</span>
      <span class="ml-auto font-bold text-[#1a237e] shrink-0">${fmt(t.importe)}</span>
      <span class="text-xs px-2 py-0.5 rounded-full ${t.estado==='hecho'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'} shrink-0">${t.estado==='hecho'?'✅ Hecho':'⏳'}</span>
    </div>
  `).join('');

  el.innerHTML = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">Resumen del viaje</h2>
    <p class="text-gray-500 text-sm mb-6">${D.meta.fechas} · ${D.meta.personas.join(' · ')}</p>

    <!-- Total viaje -->
    <div class="bg-gradient-to-br from-[#1a237e] to-[#3949ab] text-white rounded-2xl p-6 mb-6 shadow-lg">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <p class="text-blue-200 text-sm font-medium">TOTAL VIAJE YA PAGADO</p>
          <p class="text-4xl font-extrabold mt-1">${fmt(totalViaje)}</p>
          <p class="text-blue-300 text-xs mt-2">Gastos en destino (comidas, entradas adicionales) NO incluidos</p>
        </div>
        <div class="text-right sm:text-right">
          <p class="text-blue-200 text-xs">Por persona (÷6 igual)</p>
          <p class="text-2xl font-bold">${fmt(r1.porPersona)}</p>
        </div>
      </div>
      <div class="mt-4 bg-white/10 rounded-full h-2">
        <div class="progress-bar h-2 rounded-full" style="width:100%"></div>
      </div>
      <p class="text-xs text-blue-300 mt-1">100% del viaje reservado y pagado ✅</p>
    </div>

    <!-- Gastos por bloque -->
    <h3 class="text-lg font-bold text-gray-800 mb-3">Gastos principales</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      ${gastoCards}
    </div>

    <!-- Quién pagó -->
    <h3 class="text-lg font-bold text-gray-800 mb-3">¿Quién adelantó el dinero?</h3>
    <div class="space-y-3 mb-6">
      ${pagoCards}
    </div>

    <!-- Mini transferencias -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-gray-800">💸 Transferencias pendientes</h3>
        <span class="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full">Reparto ÷6 igual</span>
      </div>
      ${miniReparto}
      <p class="text-xs text-gray-400 mt-3">Para ver el reparto diferenciado (por edades) → pestaña 💸 Reparto</p>
    </div>
  `;
}

// ══ REPARTO ═══════════════════════════════════════════════════════════════
function renderReparto(D) {
  const el = document.getElementById('reparto-content');

  function repartoBlock(rep, color) {
    const rows = rep.personas.map(p => {
      const pos = p.saldo >= 0;
      return `
        <tr class="${pos?'bg-green-50':'bg-red-50'}">
          <td class="px-4 py-3 font-semibold text-gray-800">${p.nombre}</td>
          <td class="px-4 py-3 text-right text-gray-600">${fmt(p.pago)}</td>
          <td class="px-4 py-3 text-right text-gray-600">${fmt(p.corresponde)}</td>
          <td class="px-4 py-3 text-right font-bold ${pos?'saldo-pos':'saldo-neg'}">${pos?'+':''}${fmt(p.saldo)}</td>
          <td class="px-4 py-3 text-center">
            <span class="text-xs px-2 py-1 rounded-full font-semibold ${pos?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">
              ${pos?'✅ Le deben':'⚠️ Debe pagar'}
            </span>
          </td>
        </tr>
      `;
    }).join('');

    const trans = rep.transferencias.map((t,i) => `
      <div class="flex flex-wrap items-center gap-2 py-3 ${i<rep.transferencias.length-1?'border-b border-gray-100':''}">
        <span class="font-bold text-gray-800 w-24">${t.de}</span>
        <span class="text-gray-400 text-lg">→</span>
        <span class="text-gray-700 w-24">${t.a}</span>
        <span class="text-xs text-gray-500 flex-1">${t.concepto}</span>
        <span class="font-extrabold text-[#1a237e] text-base">${fmt(t.importe)}</span>
        <span class="text-xs px-2 py-0.5 rounded-full ${t.estado==='hecho'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">
          ${t.estado==='hecho'?'✅ Hecho':'⏳ Pendiente'}
        </span>
      </div>
    `).join('');

    return `
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-6">
        <div class="bg-[#1a237e] text-white px-5 py-4">
          <h3 class="text-lg font-bold">${rep.titulo}</h3>
          <p class="text-blue-200 text-sm mt-1">${rep.descripcion}</p>
          ${rep.porPersona ? `<p class="text-2xl font-extrabold mt-2">${fmt(rep.porPersona)} <span class="text-sm font-normal text-blue-300">por persona</span></p>` : ''}
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-100">
                <th class="px-4 py-3 text-left text-gray-600 font-semibold">Persona</th>
                <th class="px-4 py-3 text-right text-gray-600 font-semibold">Pagó</th>
                <th class="px-4 py-3 text-right text-gray-600 font-semibold">Le corresponde</th>
                <th class="px-4 py-3 text-right text-gray-600 font-semibold">Diferencia</th>
                <th class="px-4 py-3 text-center text-gray-600 font-semibold">Estado</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">${rows}</tbody>
          </table>
        </div>
        <div class="px-5 py-4 border-t border-gray-100">
          <p class="font-bold text-gray-800 mb-3">💸 Transferencias a realizar</p>
          ${trans}
        </div>
      </div>
    `;
  }

  el.innerHTML = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">Reparto de gastos</h2>
    <p class="text-gray-500 text-sm mb-6">Total viaje: ${fmt(D.meta.totalViaje)}</p>

    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 text-sm">
      <p class="font-semibold text-amber-800">📊 ¿Cuál usar?</p>
      <p class="text-amber-700 mt-1">
        <strong>Reparto ÷6 igual:</strong> Todos pagan lo mismo (${fmt(D.reparto.igual.porPersona)}/persona) — más simple.<br>
        <strong>Reparto diferenciado:</strong> Maletas y tasa local según gasto real, niños sin tasa adulto — más justo.
      </p>
    </div>

    ${repartoBlock(D.reparto.igual, 'blue')}
    ${repartoBlock(D.reparto.diferenciado, 'teal')}

    <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 text-xs text-blue-700 mt-2">
      ℹ️ Diferencia máxima entre adulto y niño (diferenciado):
      ${fmt(D.reparto.diferenciado.personas.find(p=>p.nombre==='Juani').corresponde - D.reparto.diferenciado.personas.find(p=>p.nombre==='Jairo').corresponde)}
    </div>
  `;
}

// ══ ITINERARIO ════════════════════════════════════════════════════════════
function renderItinerario(D) {
  const el = document.getElementById('itinerario-content');

  const dias = D.itinerario.map(dia => {
    const clr = dia.color;
    const acts = dia.actividades.map(a => `
      <div class="pl-4 border-l-2 border-gray-200 pb-4 last:pb-0">
        <p class="font-semibold text-gray-800 text-sm">${a.titulo}</p>
        <p class="text-xs text-gray-500 mt-1 whitespace-pre-line">${a.detalles}</p>
        <div class="flex flex-wrap gap-2 mt-2">
          ${a.coste ? `<span class="text-xs px-2 py-0.5 rounded-full ${a.coste.includes('PAGADO')?'bg-green-100 text-green-700':'bg-blue-50 text-blue-700'} font-medium">${a.coste}</span>` : ''}
          ${a.notas ? `<span class="text-xs text-gray-400 italic">${a.notas}</span>` : ''}
        </div>
      </div>
    `).join('');

    return `
      <div class="card bg-white rounded-2xl border ${c(clr,'border')} shadow-sm overflow-hidden mb-4">
        <div class="${c(clr,'hdr')} text-white px-5 py-3 flex items-center justify-between">
          <div>
            <span class="text-lg font-extrabold">${dia.dia}</span>
            <span class="ml-3 text-sm font-medium opacity-90">${dia.etapa}</span>
          </div>
        </div>
        <div class="p-5 space-y-4">${acts}</div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">Itinerario completo</h2>
    <p class="text-gray-500 text-sm mb-6">${D.meta.fechas}</p>
    ${dias}
    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-sm mt-2">
      <p class="font-bold text-red-800">🚨 Avisos críticos</p>
      <ul class="mt-2 space-y-1 text-red-700 text-xs list-disc list-inside">
        <li>Día 13: Vuelo ORY→SVQ a las 09:50h. Salir del hotel Disney a las 06:00h MÁXIMO.</li>
        <li>FREE TOUR Día 8: Reservar en guruwalk.com con antelación (plazas limitadas).</li>
        <li>Consigna Día 9: El Explorers Hotel tiene consigna GRATUITA 24h para huéspedes.</li>
      </ul>
    </div>
  `;
}

// ══ TRANSPORTE ════════════════════════════════════════════════════════════
function renderTransporte(D) {
  const el = document.getElementById('transporte-content');

  const sections = D.transporte.map(sec => {
    const clr = sec.color;

    if (sec.info) {
      // Navigo Easy special section
      const rows = sec.info.map((r,i) => `
        <div class="${i%2===0?'bg-yellow-50':'bg-white'} px-4 py-3 ${r.label.includes('CRÍTICO')?'border border-red-300 rounded-lg my-1':''} ">
          <span class="font-semibold text-gray-700 text-sm ${r.label.includes('CRÍTICO')?'text-red-700':''}">${r.label}:</span>
          <span class="text-sm text-gray-600 ml-2 ${r.label.includes('CRÍTICO')?'text-red-600 font-medium':''}">${r.valor}</span>
        </div>
      `).join('');
      return `
        <div class="card bg-white rounded-2xl border border-yellow-200 shadow-sm overflow-hidden mb-4">
          <div class="bg-yellow-500 text-white px-5 py-3">
            <h3 class="font-bold text-base">${sec.titulo}</h3>
          </div>
          <div class="divide-y divide-yellow-50">${rows}</div>
        </div>
      `;
    }

    const rows = sec.tramos.map((t,i) => `
      <div class="${i%2===0?'bg-white':'bg-gray-50'} p-4">
        <div class="flex flex-wrap gap-2 items-start justify-between mb-2">
          <div>
            <p class="font-semibold text-gray-800 text-sm">${t.tramo}</p>
            <p class="text-xs text-gray-500 mt-0.5">${t.medio} · ${t.duracion}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-bold text-[#1a237e]">${t.total}</p>
            <p class="text-xs text-gray-500">${t.precio_adulto} adulto${t.precio_nino && t.precio_nino!=='—'?' · '+t.precio_nino+' niño':''}</p>
          </div>
        </div>
        ${t.nota ? `<p class="text-xs text-gray-500 mt-1 italic border-l-2 border-gray-200 pl-2">${t.nota}</p>` : ''}
        ${t.reservar && t.reservar!=='—' ? `<p class="text-xs mt-1"><span class="font-medium text-gray-600">Reservar en:</span> <span class="text-blue-600">${t.reservar}</span></p>` : ''}
      </div>
    `).join('');

    return `
      <div class="card bg-white rounded-2xl border ${c(clr,'border')} shadow-sm overflow-hidden mb-4">
        <div class="${c(clr,'hdr')} text-white px-5 py-3">
          <h3 class="font-bold text-base">${sec.titulo}</h3>
        </div>
        <div class="divide-y divide-gray-100">${rows}</div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">Guía de transportes</h2>
    <p class="text-gray-500 text-sm mb-6">Todos los trayectos del viaje</p>
    ${sections}
  `;
}

// ══ RESERVAS ══════════════════════════════════════════════════════════════
function renderReservas(D) {
  const el = document.getElementById('reservas-content');
  const totalViaje = D.meta.totalViaje;

  const blocks = Object.values(D.reservas).map(res => {
    const clr = res.color;
    const rows = res.datos.map((d,i) => `
      <div class="${i%2===0?'bg-white':'bg-gray-50'} px-4 py-3 flex gap-3">
        <span class="font-semibold text-gray-600 text-sm shrink-0 w-40">${d.label}</span>
        <span class="text-sm text-gray-800 ${d.valor.includes('✅')?'font-semibold text-green-700':''} ${d.valor.includes('⚠️')?'font-semibold text-amber-700':''}">${d.valor}</span>
      </div>
    `).join('');
    return `
      <div class="card bg-white rounded-2xl border ${c(clr,'border')} shadow-sm overflow-hidden mb-5">
        <div class="${c(clr,'hdr')} text-white px-5 py-4">
          <h3 class="text-lg font-bold">${res.titulo}</h3>
        </div>
        <div class="divide-y divide-gray-50">${rows}</div>
      </div>
    `;
  }).join('');

  // Resumen financiero
  const gastos = D.financiero.gastos;
  const resumenFin = gastos.map(g => `
    <div class="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
      <span class="text-sm text-gray-700">${g.concepto}</span>
      <span class="font-bold text-gray-800">${fmt(g.total)}</span>
    </div>
  `).join('');

  el.innerHTML = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">Reservas confirmadas</h2>
    <p class="text-gray-500 text-sm mb-6">Datos de referencia para el viaje</p>
    ${blocks}
    <div class="bg-gradient-to-br from-[#1a237e] to-[#3949ab] text-white rounded-2xl p-5 shadow">
      <h3 class="font-bold text-lg mb-3">💰 Resumen financiero global</h3>
      ${resumenFin}
      <div class="mt-3 pt-3 border-t border-white/20 flex justify-between items-center">
        <span class="font-bold text-blue-200">TOTAL VIAJE YA PAGADO</span>
        <span class="text-2xl font-extrabold">${fmt(totalViaje)}</span>
      </div>
    </div>
  `;
}

// ══ DISNEY ════════════════════════════════════════════════════════════════
function renderDisney(D) {
  const el = document.getElementById('disney-content');

  const dias = D.disney.dias.map(dia => {
    const clr = dia.color;
    const rows = dia.plan.map((a,i) => `
      <tr class="${i%2===0?'bg-white':'bg-gray-50'}">
        <td class="px-4 py-3 text-sm font-bold text-gray-700 whitespace-nowrap">${a.hora}</td>
        <td class="px-4 py-3 text-sm font-semibold text-gray-800">${a.titulo}</td>
        <td class="px-4 py-3 text-xs text-gray-500 hide-mobile">${a.parque}</td>
        <td class="px-4 py-3 text-xs text-gray-500 hide-mobile">${a.quien}</td>
        <td class="px-4 py-3">
          <span class="text-xs px-2 py-0.5 rounded-full font-medium ${a.cola.includes('Premier')?'bg-amber-100 text-amber-700':a.cola==='Sin cola'?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}">${a.cola}</span>
        </td>
        <td class="px-4 py-3 text-xs text-gray-400 italic hide-mobile">${a.notas}</td>
      </tr>
    `).join('');

    return `
      <div class="card bg-white rounded-2xl border ${c(clr,'border')} shadow-sm overflow-hidden mb-4">
        <div class="${c(clr,'hdr')} text-white px-5 py-3">
          <h3 class="font-bold text-base">${dia.dia} — ${dia.tipo}</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Hora</th>
                <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Actividad</th>
                <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold hide-mobile">Parque</th>
                <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold hide-mobile">Para quién</th>
                <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Cola</th>
                <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold hide-mobile">Notas</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');

  // Premier Access
  const paRows = D.disney.premierAccess.map((pa,i) => `
    <tr class="${i%2===0?'bg-white':'bg-gray-50'}">
      <td class="px-4 py-3 text-sm font-bold ${pa.prioridad.includes('COMPRAR')? 'text-green-700': pa.prioridad.includes('VALORAR')?'text-amber-600':'text-gray-400'}">${pa.prioridad}</td>
      <td class="px-4 py-3 text-sm font-semibold text-gray-800">${pa.titulo}</td>
      <td class="px-4 py-3 text-xs text-gray-500 hide-mobile">${pa.parque}</td>
      <td class="px-4 py-3 text-xs text-gray-500 hide-mobile">${pa.quien}</td>
      <td class="px-4 py-3 text-sm font-bold text-[#1a237e]">${pa.precio}</td>
      <td class="px-4 py-3 text-xs text-gray-600 italic">${pa.veredicto}</td>
    </tr>
  `).join('');

  el.innerHTML = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">🎢 Estrategia Disney</h2>
    <p class="text-gray-500 text-sm mb-6">${D.disney.subtitulo}</p>
    ${dias}
    <div class="card bg-white rounded-2xl border border-amber-200 shadow-sm overflow-hidden mb-4">
      <div class="bg-amber-500 text-white px-5 py-3">
        <h3 class="font-bold text-base">⭐ Premier Access — Solo 2 imprescindibles con 6 personas en septiembre</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Prioridad</th>
              <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Atracción</th>
              <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold hide-mobile">Parque</th>
              <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold hide-mobile">Para quién</th>
              <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Precio est.</th>
              <th class="px-4 py-2 text-left text-xs text-gray-500 font-semibold">Veredicto</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50">${paRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ══ CHECKLIST ════════════════════════════════════════════════════════════
function renderChecklist(D) {
  const el = document.getElementById('checklist-content');

  const catConfig = {
    urgente: { label: '🔴 Urgente / Ya Hecho',       bg: 'bg-red-600',    border: 'border-red-200' },
    proximo: { label: '🟡 Pendiente — Próximas Semanas', bg: 'bg-amber-500', border: 'border-amber-200' },
    salir:   { label: '🟢 Antes de Salir',             bg: 'bg-green-600',  border: 'border-green-200' },
    orly:    { label: '🔵 Al Llegar a Orly',           bg: 'bg-blue-700',   border: 'border-blue-200' },
  };

  const total = D.checklist.length;
  const hechos = D.checklist.filter(t => t.estado === 'confirmado').length;
  const pctDone = pct(hechos, total);

  let html = `
    <h2 class="text-2xl font-extrabold text-gray-900 mb-1">✅ Checklist del viaje</h2>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-6">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-semibold text-gray-700">Progreso general</span>
        <span class="text-sm font-bold text-[#1a237e]">${hechos}/${total} tareas</span>
      </div>
      <div class="bg-gray-100 rounded-full h-3">
        <div class="progress-bar h-3 rounded-full" style="width:${pctDone}%"></div>
      </div>
      <p class="text-xs text-gray-400 mt-1">${pctDone}% completado</p>
    </div>
  `;

  Object.entries(catConfig).forEach(([cat, cfg]) => {
    const items = D.checklist.filter(t => t.categoria === cat);
    if (!items.length) return;

    const rows = items.map(t => {
      const done = t.estado === 'confirmado';
      return `
        <div class="flex items-start gap-3 px-4 py-3 ${done?'bg-green-50':'bg-white'} border-b border-gray-50 last:border-0">
          <span class="text-lg mt-0.5 shrink-0">${done?'☑':'☐'}</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-800 ${done?'line-through text-gray-400':''}">${t.tarea}</p>
            <p class="text-xs text-gray-500 mt-0.5">${t.detalle}</p>
          </div>
          <div class="text-right shrink-0">
            <span class="text-xs ${done?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'} px-2 py-0.5 rounded-full font-medium whitespace-nowrap">${done?'✅ Hecho':t.plazo}</span>
          </div>
        </div>
      `;
    }).join('');

    html += `
      <div class="card bg-white rounded-2xl border ${cfg.border} shadow-sm overflow-hidden mb-4">
        <div class="${cfg.bg} text-white px-5 py-3">
          <h3 class="font-bold text-base">${cfg.label}</h3>
        </div>
        <div class="divide-y divide-gray-50">${rows}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}
</script>
</body>
</html>
